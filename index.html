<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Class Registration Form</title>
  <meta
    name="description"
    content="Register for the AI Income Masterclass by filling the official class form."
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap"
    rel="stylesheet"
  >
  <style>
    :root {
      --bg: #0b1020;
      --bg-soft: #111831;
      --panel: #121b35;
      --panel-border: #26345f;
      --text: #eef3ff;
      --text-muted: #b5c0e0;
      --primary: #6ea8fe;
      --primary-strong: #3d7bfd;
      --accent: #45d6a8;
      --danger: #ff6b6b;
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Manrope", sans-serif;
      background:
        radial-gradient(circle at 15% 0%, rgba(110, 168, 254, 0.2), transparent 35%),
        radial-gradient(circle at 85% 20%, rgba(69, 214, 168, 0.18), transparent 30%),
        var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 2rem 1rem;
    }

    .form-wrap {
      width: min(680px, 100%);
      background: linear-gradient(180deg, rgba(18, 27, 53, 0.92), rgba(13, 19, 39, 0.96));
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      padding: 1.4rem;
      box-shadow: 0 24px 50px rgba(6, 10, 24, 0.42);
    }

    h1 {
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(1.6rem, 3vw, 2.25rem);
      line-height: 1.2;
      margin-bottom: 0.45rem;
    }

    .subtitle {
      color: var(--text-muted);
      margin-bottom: 1.25rem;
      font-size: 0.95rem;
    }

    form {
      display: grid;
      gap: 0.95rem;
    }

    .field {
      display: grid;
      gap: 0.45rem;
    }

    label {
      font-size: 0.9rem;
      font-weight: 600;
      color: #dbe6ff;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid rgba(181, 192, 224, 0.3);
      border-radius: 10px;
      background: rgba(17, 24, 49, 0.88);
      color: var(--text);
      padding: 0.78rem 0.84rem;
      font: inherit;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(110, 168, 254, 0.2);
    }

    .btn {
      margin-top: 0.25rem;
      border: none;
      border-radius: 10px;
      padding: 0.85rem 1rem;
      background: linear-gradient(145deg, var(--primary), var(--primary-strong));
      color: #ffffff;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
    }

    .btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .status {
      margin-top: 0.6rem;
      font-size: 0.9rem;
      color: #cde3ff;
      min-height: 1.2em;
    }

    .status.error {
      color: var(--danger);
    }

    .status.success {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <section class="form-wrap" aria-label="AI Class registration">
    <h1>AI Class Registration Form</h1>
    <p class="subtitle">
      Complete this form to register for the AI Income Masterclass.
    </p>

    <form
      id="aiClassForm"
      action="https://formspree.io/f/xovndjnz"
      method="POST"
    >
      <div class="field">
        <label for="fullName">Full Name</label>
        <input id="fullName" name="fullName" type="text" autocomplete="name" required>
      </div>

      <div class="field">
        <label for="email">Email Address</label>
        <input id="email" name="email" type="email" autocomplete="email" required>
      </div>

      <div class="field">
        <label for="phone">Phone Number (WhatsApp)</label>
        <input id="phone" name="phone" type="tel" autocomplete="tel" required>
      </div>

      <div class="field">
        <label for="country">Country</label>
        <input id="country" name="country" type="text" required>
      </div>

      <div class="field">
        <label for="experience">Current AI Experience Level</label>
        <select id="experience" name="experience" required>
          <option value="">Select one</option>
          <option value="Beginner">Beginner</option>
          <option value="Intermediate">Intermediate</option>
          <option value="Advanced">Advanced</option>
        </select>
      </div>

      <div class="field">
        <label for="goal">What is your main goal for joining?</label>
        <textarea id="goal" name="goal" required></textarea>
      </div>

      <button class="btn" id="submitBtn" type="submit">Submit Registration</button>
      <p id="statusMessage" class="status" aria-live="polite"></p>
    </form>
  </section>

  <script>
    const form = document.getElementById("aiClassForm");
    const statusMessage = document.getElementById("statusMessage");
    const submitBtn = document.getElementById("submitBtn");

    form.addEventListener("submit", async function (event) {
      event.preventDefault();

      if (!form.checkValidity()) {
        statusMessage.textContent = "Please complete all required fields correctly.";
        statusMessage.className = "status error";
        return;
      }

      submitBtn.disabled = true;
      statusMessage.textContent = "Submitting your registration...";
      statusMessage.className = "status";

      try {
        const response = await fetch(form.action, {
          method: "POST",
          body: new FormData(form),
          headers: {
            Accept: "application/json"
          }
        });

        if (!response.ok) {
          throw new Error("Form submission failed.");
        }

        statusMessage.textContent = "Registration successful. Redirecting you to the main website...";
        statusMessage.className = "status success";
        form.reset();

        setTimeout(function () {
          window.location.href = "https://stephenakintayo.com/";
        }, 1500);
      } catch (error) {
        statusMessage.textContent = "Unable to submit now. Please try again.";
        statusMessage.className = "status error";
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
